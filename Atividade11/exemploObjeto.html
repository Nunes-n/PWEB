<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var aluno1 = new Object();
        //usando Object
        aluno1.ra = "00304822212";
        aluno1.nome = "eduardo";
        //criando propriedades dinamicamente
        alert("ra: " + aluno1.ra + " nome: " + aluno1.nome);

        var aluno2 = {}; //usando {}
        aluno2.ra = "1234";
        aluno2["nome"] = "gabriel";
        alert("ra: " + aluno2.ra + " nome: " + aluno2.nome);
        aluno2["email do aluno"] = "gabriel@gmail.com"; //propriedade criada como string
        alert(aluno2["email do aluno"]); //só pode ser chamada por string

        var aluno3 = {ra: "123456", nome: "jose"};
        alert("ra: " + aluno3.ra + " nome: " + aluno3.nome);

        //usando função construtora para criar classe
        //this é public
        function Aluno(ra, nome){
            this.ra = ra;
            this.nome = nome;
            this.MostraDados = function(){
                return "ra: " + this.ra + " nome: " + this.nome;
            }
        }
        var aluno4 = new Aluno("123456788", "jamilly");
        alert(aluno4.MostraDados());
        alert(aluno4.nome);

        //função construtora sem parametros
        function Aluno2(){
            var ra; //encapsulamento escondido, semelhante ao private
            var nome;
            this.setRa = function(value){
                this.ra = value;
            }
            this.getRa = function(){
                return this.ra;
            }
            this.setNome = function(value){
                this.nome = value;
            }
            this.getNome = function(){
                return this.nome;
            }
        }
        var aluno6 = new Aluno2();
        aluno6.setNome("Lana");
        aluno6.setRa("234");
        alert("ra: " + aluno6.getRa() + " nome: " + aluno6.getNome());

        //herança
        function AlunoADS(){
            var numLab;
            this.setNumLab = function(value){
                this.numLab = value;
            }
            this.getNumLab = function(){
                return this.numLab;
            }
        }
        AlunoADS.prototype = new Aluno2(); //defiene a herança
                                            //AlunoADS é uma função filha de Aluno2
        var aluno7 = new AlunoADS();
        aluno7.setNome("Murilo");
        aluno7.setRa("123");
        aluno7.setNumLab(5);
        alert("ra: " + aluno7.getRa() + " nome: " + aluno7.getNome() + " num lab: " + aluno7.getNumLab);


        //usando class (versões mais novas)
        class Aluno1{
            constructor(){
                this._ra;
                this._nome;
            }
            setNome(value){
                this._nome = value;
            }
            getNome(){
                return this._nome;
            }
            setRa(value){
                this._ra = value;
            }
            getRa(){
                return this._ra;
            }
        }
        var objAluno = new Aluno1();
        objAluno.setNome("Caroline");
        objAluno.setRa("567");
        alert("nome: " + objAluno.getNome + " ra: " + objAluno.getRa);

        //herança
        class AlunoADS1 extends Aluno1{
            constructor(){
                //super chama o construtor da classe pai
                super();
                this._numLab;
            }
            setNumLab(value){
                this._numLab = value;
            }
            getNumLab(){
                return this._numLab;
            }
        }
        var objAlunoADS = new AlunoADS1();
        objAlunoADS.setNome("Otavio");
        objAlunoADS.setRa("877");
        objAlunoADS.setNumLab(6);
        alert("nome: " + objAlunoADS.getNome + " ra: " + objAlunoADS.getRa + " num lab: " + objAlunoADS.getNumLab);

        //OUTROS

        //copia e objetos

        var obj1 = new Object();
        var obj2 = obj1;
        obj1.nome = "camila";
        alert(obj2.nome);

        //metodos e atributos publicos e privados
        class ContaBancaria{
            #cpf; //atributo privado

            constructor(nome, saldoInicial){
                this.nome = nome; //atributo publico
                this.saldo = saldoInicial;
            }

            setCpf(value){
                this.cpf = value;
            }
            getCpf(){
                return this.cpf;
            }
            getSaldo(){
                return this.saldo;
            }
            getNome(){
                return this.nome;
            }

            depositar(valor){
                this.saldo += valor;
                this.#registrarTransacao(valor);
            }

            #registrarTransacao(valor){
                console.log(`Deposito de R$ ${valor} realizado pelo ${this.nome} e o saldo R$ ${this.saldo} para o cpf ${this.getCpf()} ou ${this.#cpf}`);
            }
        }

        const conta = new ContaBancaria("Gustavo", 1000);
        conta.setCpf(123);
        conta.depositar(50);
        //ver no console se aparece

        //trasnforma um array de pares chave-valor em um objeto
        const arr = [['codigo',1],['nome',"joão"],['idade',23]];
        const obj = Object.fromEntries(arr);
        alert(obj);
        alert(obj.nome);
        alert(JSON.stringify(obj));

        const objEmpresa = {empresa: 'ZF do Brasil'};
        const funcionario = Object.create(objEmpresa, {
            nome: {
                value: 'Jorge'
            },
            endereco: {
                value: 'Av. São Paulo'
            }
        });
        console.log(funcionario.empresa);
        console.log(funcionario.nome);
        console.log(funcionario.endereco);

        const objNovaEmpresa = {
            empresa: 'ZF do Brasil'
        }
        const objVeiculo = {
            placa: 'XXXX1234'
        }
        const motorista = Object.assign({
            cpf: "123"
        }, objNovaEmpresa, objVeiculo);
        console.log(motorista);
        
    </script>
</body>
</html>
