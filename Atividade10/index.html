<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="atv10.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Gabriel Nunes Ereno">
    <title>Atividade 10</title>
</head>
<body>
    <h1>Calculadora IMC</h1>
    <div class="container-main">
    <div class="block form">
        <div class="resultado">
            <p id="resultado">_</p>
        </div>
        <form>
            <label for="altura">altura(m):</label>
            <input type="number" id="altura" name="altura">

            <br>

            <label for="peso">peso atual(kg):</label>
            <input type="number" id="peso" name="peso">

            <br>

            <button type="button" onclick="calcular()" id="btnCalcular">calcular</button>
        </form>
    </div>
    <div class="block table">
        <table>
            <tr>
                <th>IMC</th>
                <th>classifição</th>
                <th>obesidade (grau)</th>
            </tr>
            <tr>
                <td>menor que 18.5</td>
                <td>magreza</td>
                <td>0</td>
            </tr>
            <tr>
                <td>entre 18.5 e 24.9</td>
                <td>normal</td>
                <td>0</td>
            </tr>
            <tr>
                <td>entre 25.0 e 29.9</td>
                <td>sobrepeso</td>
                <td>I</td>
            </tr>
            <tr>
                <td>entre 30.0 e 39.9</td>
                <td>obesidade</td>
                <td>II</td>
            </tr>
            <tr>
                <td>maior que 40.0</td>
                <td>obesidade grave</td>
                <td>III</td>
            </tr>
        </table>
    </div>
    </div>

    <script src="atv10.js"></script>
</body>
</html>
